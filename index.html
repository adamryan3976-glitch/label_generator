<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avery Label Master</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏷️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234F46E5%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22 fill=%22white%22>L</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --nudge-x: 0in;
            --nudge-y: 0in;
        }

        @media print {
            @page {
                size: letter;
                margin: 0;
            }
            body { margin: 0; padding: 0; background: white !important; }
            .no-print { display: none !important; }
            .print-page { 
                width: 8.5in; 
                height: 11in; 
                margin: 0 !important; 
                padding-top: calc(var(--m-top) + var(--nudge-y)) !important; 
                padding-left: calc(var(--m-side) + var(--nudge-x)) !important;
                page-break-after: always;
                box-sizing: border-box;
                overflow: hidden;
                background: white !important;
            }
        }
        
        .label-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
            width: var(--label-w);
            height: var(--label-h);
            vertical-align: top;
            margin-right: var(--h-gap);
            margin-bottom: var(--v-gap);
        }

        /* Remove margin from last column to prevent wrapping */
        .label-cell:nth-child(var(--cols)n) {
            margin-right: 0 !important;
        }

        .label-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #preview-container {
            background: #e5e7eb;
            min-height: 100vh;
            padding: 2rem 0;
        }

        .sheet-preview {
            background: white;
            width: 8.5in;
            height: 11in;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: left;
            font-size: 0; /* Remove whitespace between inline-block cells */
            padding-top: calc(var(--m-top) + var(--nudge-y));
            padding-left: calc(var(--m-side) + var(--nudge-x));
        }

        .debug-border .label-cell {
            outline: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="no-print min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-80 bg-white border-r border-slate-200 p-6 space-y-6 overflow-y-auto">
            <header>
                <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    <span>🏷️</span> Label Master
                </h1>
                <p class="text-xs text-slate-500 mt-1">Avery Template Repeater</p>
            </header>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">1. Choose Image</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">2. Template Code</label>
                    <select id="templateSelect" class="w-full border rounded-md p-2 text-sm bg-slate-50">
                        <option value="5160">5160 (1" x 2.625") - 30/Sheet</option>
                        <option value="5163">5163 (2" x 4") - 10/Sheet</option>
                        <option value="5167">5167 (0.5" x 1.75") - 80/Sheet</option>
                        <option value="5195">5195 (0.66" x 1.75") - 60/Sheet</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3 border-t pt-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Start Row</label>
                        <input type="number" id="startRow" min="1" value="1" class="w-full border rounded-md p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Start Col</label>
                        <input type="number" id="startCol" min="1" value="1" class="w-full border rounded-md p-2 text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Total Labels to Print</label>
                    <input type="number" id="totalCount" min="1" value="30" class="w-full border rounded-md p-2 text-sm">
                </div>

                <div class="space-y-2 border-t pt-4">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Calibration (Nudge)</label>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] text-slate-500">Horizontal (in)</label>
                            <input type="number" id="nudgeX" step="0.01" value="0" class="w-full border rounded-md p-1 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500">Vertical (in)</label>
                            <input type="number" id="nudgeY" step="0.01" value="0" class="w-full border rounded-md p-1 text-sm">
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="showBorders" class="rounded text-indigo-600">
                    <label for="showBorders" class="text-sm">Show print guides</label>
                </div>

                <button onclick="window.print()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow-lg hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    Print Labels
                </button>
            </div>

            <footer class="text-[10px] text-slate-400 pt-10">
                <p><strong>PRO TIP:</strong> Many printers have a "printable area" limitation. If the top row is missing, increase the <strong>Vertical Nudge</strong>.</p>
            </footer>
        </aside>

        <main id="preview-container" class="flex-1 flex justify-center overflow-auto">
            <div id="render-area" class="h-max"></div>
        </main>
    </div>

    <div id="print-area" class="hidden print:block"></div>

    <script>
        const TEMPLATES = {
            "5160": { 
                rows: 10, cols: 3, 
                width: "2.625in", height: "1in",
                mTop: "0.5in", mSide: "0.1875in", 
                vGap: "0in", hGap: "0.125in" 
            },
            "5163": { 
                rows: 5, cols: 2, 
                width: "4in", height: "2in",
                mTop: "0.5in", mSide: "0.156in", 
                vGap: "0in", hGap: "0.188in" 
            },
            "5167": { 
                rows: 20, cols: 4, 
                width: "1.75in", height: "0.5in",
                mTop: "0.5in", mSide: "0.28in", 
                vGap: "0in", hGap: "0.3in" 
            },
            "5195": { 
                rows: 15, cols: 4, 
                width: "1.75in", height: "0.66in",
                mTop: "0.5in", mSide: "0.28in", 
                vGap: "0in", hGap: "0.3in" 
            }
        };

        let currentImage = null;

        const imageInput = document.getElementById('imageInput');
        const templateSelect = document.getElementById('templateSelect');
        const startRow = document.getElementById('startRow');
        const startCol = document.getElementById('startCol');
        const totalCount = document.getElementById('totalCount');
        const showBorders = document.getElementById('showBorders');
        const nudgeX = document.getElementById('nudgeX');
        const nudgeY = document.getElementById('nudgeY');
        const renderArea = document.getElementById('render-area');
        const printArea = document.getElementById('print-area');

        [templateSelect, startRow, startCol, totalCount, showBorders, nudgeX, nudgeY].forEach(el => {
            el.addEventListener('input', generateLabels);
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImage = event.target.result;
                    generateLabels();
                };
                reader.readAsDataURL(file);
            }
        });

        function generateLabels() {
            const template = TEMPLATES[templateSelect.value];
            const startR = parseInt(startRow.value) || 1;
            const startC = parseInt(startCol.value) || 1;
            const count = parseInt(totalCount.value) || 1;
            const showG = showBorders.checked;
            
            // Update nudge variables
            document.documentElement.style.setProperty('--nudge-x', nudgeX.value + 'in');
            document.documentElement.style.setProperty('--nudge-y', nudgeY.value + 'in');

            const cellsPerSheet = template.rows * template.cols;
            const skipCells = ((startR - 1) * template.cols) + (startC - 1);
            const totalRequiredCells = skipCells + count;
            const numSheets = Math.ceil(totalRequiredCells / cellsPerSheet);

            let htmlContent = '';
            let labelsPlaced = 0;

            for (let s = 0; s < numSheets; s++) {
                let sheetHtml = `<div class="sheet-preview print-page ${showG ? 'debug-border' : ''}" style="
                    --m-top: ${template.mTop}; 
                    --m-side: ${template.mSide};
                    --label-w: ${template.width};
                    --label-h: ${template.height};
                    --h-gap: ${template.hGap};
                    --v-gap: ${template.vGap};
                    --cols: ${template.cols};
                ">`;

                for (let i = 0; i < cellsPerSheet; i++) {
                    const globalIndex = (s * cellsPerSheet) + i;
                    const isLabel = globalIndex >= skipCells && labelsPlaced < count;
                    
                    sheetHtml += `<div class="label-cell">`;
                    if (isLabel && currentImage) {
                        sheetHtml += `<img src="${currentImage}" class="label-image">`;
                        labelsPlaced++;
                    }
                    sheetHtml += `</div>`;
                }

                sheetHtml += `</div><div class="no-print h-8"></div>`;
                htmlContent += sheetHtml;
            }

            renderArea.innerHTML = htmlContent;
            printArea.innerHTML = htmlContent;
        }

        generateLabels();
    </script>
</body>
</html>
